<div id="root"></div>

<script>
    const root=document.getElementById("root");
    let count=0;
    function render(){
        console.log("calling render function",count);
        root.innerHTML= `
        <h1>${count}</h1>
        <button onclick="increment()">Increase</button>
        <button onclick="decrement()">Decrement</button>
        <button onclick="reset()">Reset</button>
        `;
    }

    function increment(){
        count++;
        render();
        console.log("calling render");
    }
    render();

    function decrement(){
        count--;
        render();
    }

    function reset(){
        console.log("reset is called");
        count=0;
        render();
    }

    },5000);
